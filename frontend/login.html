<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ResQ - Secure Login</title>
  <link rel="stylesheet" href="./static/style.css">

</head>

<body>
  <video autoplay muted loop playsinline id="bg-video">
    <source src="../4001299143-preview.mp4" type="video/mp4">
    <source src="./static/bg.mp4" type="video/mp4">
    Your browser does not support the video tag.
  </video>
  <div class="login-container">
    <div class="login-panel">
      <div class="login-header">
        <h1 class="login-logo">ResQ</h1>
        <p class="login-subtitle">Emergency Response System</p>
      </div>
      <div id="error-msg" class="error-msg"
        style="display: none; color: var(--red-alert); background: rgba(192,57,43,0.1); padding: 1rem; border-radius: 12px; border-left: 4px solid var(--red-alert); margin-bottom: 1.5rem; text-align: center;">
      </div>
      <form method="POST" class="login-form" id="loginForm">
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" name="email" id="emailInput" placeholder="operator@resq.com" required class="form-input"
            autofocus>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" name="password" id="passwordInput" placeholder="••••••••" required class="form-input">
        </div>
        <button type="submit" class="login-btn" id="loginBtn">🚨 Sign In</button>
      </form>
      <div class="login-footer">
        <a href="#" class="forgot-link">Forgot Password?</a>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const form = document.getElementById('loginForm');
      const emailInput = document.getElementById('emailInput');
      const passwordInput = document.getElementById('passwordInput');
      const loginBtn = document.getElementById('loginBtn');
      const errorMsg = document.getElementById('error-msg');

      // Clear errors on input
      [emailInput, passwordInput].forEach(input => {
        input.addEventListener('input', function () {
          this.classList.remove('error');
          errorMsg.style.display = 'none';
        });
      });

      // Form validation
      form.addEventListener('submit', function (e) {
        const email = emailInput.value.trim();
        const password = passwordInput.value.trim();

        // Reset states
        [emailInput, passwordInput].forEach(input => input.classList.remove('error'));
        errorMsg.style.display = 'none';
        loginBtn.classList.remove('loading');

        // Validate email
        const emailRegex = /^[^\\s@]+@[^\\s@]+\\.[^\\s@]+$/;
        if (!emailRegex.test(email)) {
          e.preventDefault();
          emailInput.classList.add('error');
          showError('Please enter a valid email address');
          return;
        }

        // Validate password
        if (password.length < 6) {
          e.preventDefault();
          passwordInput.classList.add('error');
          showError('Password must be at least 6 characters long');
          return;
        }

        // Show loading
        loginBtn.classList.add('loading');
        loginBtn.innerHTML = '🚨 Signing In...';
      });

      // Enter key on password submits
      passwordInput.addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
          form.dispatchEvent(new Event('submit'));
        }
      });

      function showError(message) {
        errorMsg.textContent = message;
        errorMsg.style.display = 'block';
        // Scroll to top
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }
    });
  </script>
</body>

</html>
